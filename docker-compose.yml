services:
  api:
    build: .
    ports:
      - "5556:5556"
    environment:
      MONGO_URI: mongodb://mongo:27017/
      MONGO_DB_NAME: UserDatabase
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
